<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>TODO App</h1>
      <div class="api-status">
        <span id="statusIndicator" class="status-dot status-loading"></span>
        <span id="statusText">Checking API...</span>
      </div>
    </header>

    <main>
      <section class="add-todo">
        <h2>Add Task</h2>
        <form id="todoForm">
          <div class="form-group">
            <input 
              type="text" 
              id="taskInput" 
              placeholder="Enter a new task..." 
              required
            >
            <button type="submit" class="btn-add">Add</button>
          </div>
        </form>
      </section>

      <section class="todos-list">
        <h2>Tasks</h2>
        <div id="todosList" class="empty-state">
          <p>No tasks yet. Add one to get started!</p>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 TODO App - Built with Express and JavaScript</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
